baseURL = "https://bhktf.github.io/"
languageCode = "en-us"
title = "BHKTF"

theme = "PaperMod"
themesDir = "themes"

[params]
    env = "production"
    title = "BHKTF"
    description = "My personal site and project archive."
    
    # Theme settings
    defaultTheme = "dark" # Force dark mode right away
    disableThemeToggle = false
    ShowReadingTime = true
    ShowShareButtons = false
    ShowCodeCopyButtons = true

    # THIS WIPES THE HOMEPAGE TEMPLATE CARD:
    [params.profileMode]
        enabled = false

# Clean, simple top header links
[[menu.main]]
    name = "Home"
    url = "/"
    weight = 5

[[menu.main]]
    name = "Blog"
    url = "posts/"
    weight = 10

[[menu.main]]
    name = "Tags"
    url = "tags/"
    weight = 20
